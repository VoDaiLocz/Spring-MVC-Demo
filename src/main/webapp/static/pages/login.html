<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SocialApp</title>
    <link rel="stylesheet" href="/social-media-app/static/css/style.css">
</head>

<body class="bg-main">
    <div class="auth-shell">
        <div class="auth-card card">
            <h1 class="auth-brand">SocialApp</h1>
            <h2 class="auth-title">Đăng nhập</h2>
            <p class="auth-subtitle">Tiếp tục với tài khoản của bạn</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-input" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-fill" style="width:100%;">Đăng nhập</button>
            </form>

            <p class="auth-footer">
                Chưa có tài khoản?
                <a href="/social-media-app/static/pages/register.html">Đăng ký</a>
            </p>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="/social-media-app/static/js/api.js"></script>
    <script>
        (async function initLoginPage() {
            const currentUser = await Session.refresh();
            if (currentUser) {
                goToPage('feed.html');
                return;
            }

            document.getElementById('loginForm').onsubmit = async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const result = await UserAPI.login(username, password);
                    if (result.success && result.user) {
                        Session.save(result.user);
                        showToast('Đăng nhập thành công');
                        setTimeout(() => goToPage('feed.html'), 500);
                    } else {
                        showToast(result.message || 'Sai tài khoản hoặc mật khẩu', 'error');
                    }
                } catch (err) {
                    showToast('Lỗi kết nối server', 'error');
                }
            };
        })();
    </script>
</body>

</html>
