<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng tin - SocialApp</title>
    <link rel="stylesheet" href="/social-media-app/static/css/style.css">
</head>

<body class="bg-main">
    <div class="x-app">
        <aside class="x-left">
            <div class="x-sticky">
                <a href="/social-media-app/static/pages/feed.html" class="x-logo" aria-label="Trang chủ">Y</a>

                <nav class="x-nav">
                    <a href="/social-media-app/static/pages/feed.html" class="x-nav-link active">
                        <span class="x-nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M3 10.5l9-7 9 7"></path>
                                <path d="M5 9.5V20h14V9.5"></path>
                            </svg>
                        </span>
                        <span class="x-nav-text">Trang chủ</span>
                    </a>
                    <a href="/social-media-app/static/pages/profile.html" class="x-nav-link">
                        <span class="x-nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="8" r="4"></circle>
                                <path d="M4 21a8 8 0 0 1 16 0"></path>
                            </svg>
                        </span>
                        <span class="x-nav-text">Hồ sơ</span>
                    </a>
                </nav>

                <button type="button" class="btn btn-fill x-post-pill" onclick="focusComposer()">Đăng</button>

                <div class="x-userbox">
                    <div class="x-user-avatar" id="sidebarAvatar">?</div>
                    <div class="x-user-meta">
                        <div class="x-user-name" id="sidebarName">Đang tải...</div>
                        <div class="x-user-handle" id="sidebarRole">@user</div>
                    </div>
                    <button type="button" class="x-logout-inline" onclick="logout()">Thoát</button>
                </div>
            </div>
        </aside>

        <main class="x-center">
            <div class="x-header x-header-title">Trang chủ</div>

            <section class="x-section composer-section">
                <div class="composer-row">
                    <div class="avatar-sm composer-avatar" id="composerAvatar">A</div>
                    <div class="composer-main">
                        <input type="text" id="postTitle" class="form-input composer-title" placeholder="Tiêu đề">
                        <textarea id="postBody" class="composer-body composer-body-main" placeholder="Chuyện gì đang xảy ra?"></textarea>
                        <div class="composer-actions">
                            <div class="composer-tools" aria-hidden="true">
                                <span class="composer-tool-icon">
                                    <svg viewBox="0 0 24 24">
                                        <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                                        <circle cx="8.5" cy="9" r="1.5"></circle>
                                        <path d="M21 15l-5-5-8 8"></path>
                                    </svg>
                                </span>
                                <span class="composer-tool-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 7h14a2 2 0 0 1 2 2v8H4z"></path>
                                        <path d="M4 11l6-3v11l-6-3z"></path>
                                    </svg>
                                </span>
                                <span class="composer-tool-icon">
                                    <svg viewBox="0 0 24 24">
                                        <circle cx="12" cy="12" r="9"></circle>
                                        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                        <path d="M9 10h.01M15 10h.01"></path>
                                    </svg>
                                </span>
                                <span class="composer-tool-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 21s6-6.3 6-11a6 6 0 1 0-12 0c0 4.7 6 11 6 11z"></path>
                                        <circle cx="12" cy="10" r="2.5"></circle>
                                    </svg>
                                </span>
                                <span class="composer-tool-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 12h16"></path>
                                        <path d="M12 4v16"></path>
                                        <circle cx="12" cy="12" r="9"></circle>
                                    </svg>
                                </span>
                                <span class="composer-tool-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 6h16"></path>
                                        <path d="M4 12h10"></path>
                                        <path d="M4 18h13"></path>
                                        <circle cx="18" cy="12" r="2"></circle>
                                    </svg>
                                </span>
                            </div>
                            <button class="btn btn-fill composer-submit" id="btnPublish">Đăng</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="feedList">
                <div class="x-section-muted">Đang tải bảng tin...</div>
            </section>
        </main>

        <aside class="x-right">
            <div class="x-sticky">
                <div class="x-widget" style="margin-top:0;">
                    <h3 class="x-side-title">Gợi ý theo dõi</h3>
                    <div id="recommendedUsers">
                        <p class="x-empty-hint">Đang tải gợi ý...</p>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2 class="modal-title">Chỉnh sửa bài viết</h2>
            <input type="hidden" id="editPostId">
            <input type="hidden" id="editPostStatus">
            <div class="form-group">
                <label class="form-label">Tiêu đề</label>
                <input type="text" id="editPostTitle" class="form-input" placeholder="Tiêu đề">
            </div>
            <div class="form-group">
                <label class="form-label">Nội dung</label>
                <textarea id="editPostBody" class="publish-input" style="min-height:140px;"></textarea>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button class="btn btn-outline" onclick="closeEditModal()">Hủy</button>
                <button class="btn btn-fill" onclick="saveEdit()">Lưu</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="/social-media-app/static/js/api.js"></script>
    <script>
        let currentUser = null;

        function focusComposer() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('postBody').focus();
        }

        const postTitleEl = document.getElementById('postTitle');
        const postBodyEl = document.getElementById('postBody');
        const btnPublishEl = document.getElementById('btnPublish');

        function syncComposerState() {
            btnPublishEl.disabled =
                postTitleEl.value.trim().length === 0 ||
                postBodyEl.value.trim().length === 0;
        }

        postTitleEl.addEventListener('input', syncComposerState);
        postBodyEl.addEventListener('input', syncComposerState);

        async function loadAll() {
            await Promise.all([
                loadSidebarInfo(),
                loadFeed(),
                loadRecommended()
            ]);
        }

        async function loadSidebarInfo() {
            try {
                const user = await UserAPI.getById(currentUser.id);
                const avatarEl = document.getElementById('sidebarAvatar');
                const nameEl = document.getElementById('sidebarName');
                const roleEl = document.getElementById('sidebarRole');

                if (avatarEl) avatarEl.textContent = user.username.charAt(0).toUpperCase();
                if (nameEl) nameEl.textContent = user.username;
                if (roleEl) roleEl.textContent = '@' + user.username.toLowerCase();
            } catch (e) {
                console.error('Sidebar loading error', e);
            }
        }

        async function loadFeed() {
            const feedList = document.getElementById('feedList');
            try {
                const posts = await PostAPI.getFeed();
                if (!posts || posts.length === 0) {
                    feedList.innerHTML = '<div class="x-section-muted">Chưa có bài viết trong bảng tin.</div>';
                    return;
                }

                feedList.innerHTML = posts.map(post => renderPost(post)).join('');
            } catch (e) {
                feedList.innerHTML = '<div class="x-section-muted" style="color:#ff8087;">Không tải được bảng tin.</div>';
            }
        }

        async function loadRecommended() {
            const container = document.getElementById('recommendedUsers');
            if (!container) return;

            try {
                const [users, following] = await Promise.all([
                    UserAPI.getAll(),
                    FollowAPI.getFollowing(currentUser.id)
                ]);

                const followingSet = new Set(
                    (following || []).map(item => item.followedUserId)
                );

                const suggestions = (users || [])
                    .filter(user => user.id !== currentUser.id && !followingSet.has(user.id))
                    .slice(0, 6);

                if (suggestions.length === 0) {
                    container.innerHTML = '<p class="x-empty-hint">Không còn gợi ý phù hợp.</p>';
                    return;
                }

                container.innerHTML = suggestions.map(user => `
                    <div class="user-row">
                        <div class="user-info-sm x-user-link" onclick="window.location.href='${pageUrl('profile.html', { id: user.id })}'">
                            <div class="avatar-sm">${escapeHtml(user.username.charAt(0).toUpperCase())}</div>
                            <div class="user-meta-mini">
                                <div class="user-info-name">${escapeHtml(user.username)}</div>
                                <div class="user-info-handle">@${escapeHtml(user.username.toLowerCase())}</div>
                            </div>
                        </div>
                        <button class="btn btn-fill x-follow-btn" onclick="followUser(${user.id})">Theo dõi</button>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="x-empty-hint">Không tải được gợi ý.</p>';
            }
        }

        async function followUser(targetId) {
            const res = await FollowAPI.follow(targetId);
            if (res.success) {
                showToast('Đã theo dõi');
                loadAll();
            } else {
                showToast(res.message || 'Không thể theo dõi', 'error');
            }
        }

        function renderPost(post) {
            const isAuthor = post.userId === currentUser.id;
            const authorName = post.authorName || 'user';
            const title = (post.title || '').trim();
            const body = (post.body || '').trim();
            const text = body && title && body !== title ? `${title}\n${body}` : (body || title);
            return `
                <article class="post-card">
                    <div class="post-header">
                        <div class="post-author" onclick="window.location.href='${pageUrl('profile.html', { id: post.userId })}'" style="cursor:pointer;">
                            <div class="avatar-sm">${escapeHtml(authorName.charAt(0).toUpperCase())}</div>
                            <div class="author-headline">
                                <span class="author-name">${escapeHtml(authorName)}</span>
                                <span class="post-meta">· ${formatDate(post.createdAt)}</span>
                            </div>
                        </div>
                        ${isAuthor ? `
                            <div class="x-post-buttons">
                                <button class="btn btn-outline x-post-action" onclick="openEditModal(${post.id}, '${safeAttr(post.title)}', '${safeAttr(post.body || '')}', '${safeAttr(post.status || 'PUBLISHED')}')">Sửa</button>
                                <button class="btn btn-danger x-post-action" onclick="deletePost(${post.id})">Xóa</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="post-text">${escapeHtml(text)}</div>
                </article>
            `;
        }

        document.getElementById('btnPublish').onclick = async () => {
            const title = postTitleEl.value.trim();
            const body = postBodyEl.value.trim();

            if (!title) return showToast('Vui lòng nhập tiêu đề bài viết', 'error');
            if (!body) return showToast('Vui lòng nhập nội dung bài viết', 'error');

            const res = await PostAPI.create(title, body);
            if (res.success) {
                showToast('Đăng bài thành công');
                postTitleEl.value = '';
                postBodyEl.value = '';
                syncComposerState();
                loadAll();
            } else {
                showToast(res.message || 'Không thể đăng bài', 'error');
            }
        };

        async function deletePost(id) {
            if (!confirm('Xóa bài viết này?')) return;
            const res = await PostAPI.delete(id);
            if (res.success) {
                showToast('Đã xóa bài viết');
                loadAll();
            } else {
                showToast(res.message || 'Xóa thất bại', 'error');
            }
        }

        function openEditModal(id, title, body, status) {
            const normalizedTitle = normalizeLegacyTitle(title, body);
            document.getElementById('editPostId').value = id;
            document.getElementById('editPostTitle').value = normalizedTitle;
            document.getElementById('editPostBody').value = body;
            document.getElementById('editPostStatus').value = status || 'PUBLISHED';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function saveEdit() {
            const id = document.getElementById('editPostId').value;
            const title = document.getElementById('editPostTitle').value.trim();
            const body = document.getElementById('editPostBody').value.trim();
            const status = document.getElementById('editPostStatus').value || 'PUBLISHED';

            if (!title) return showToast('Tiêu đề không được để trống', 'error');
            if (!body) return showToast('Nội dung không được để trống', 'error');

            const res = await PostAPI.update(id, title, body, status);
            if (res.success) {
                showToast('Đã cập nhật');
                closeEditModal();
                loadAll();
            } else {
                showToast(res.message || 'Cập nhật thất bại', 'error');
            }
        }

        function safeAttr(str) {
            return String(str)
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\n/g, '\\n');
        }

        function normalizeLegacyTitle(title, body) {
            const cleanTitle = String(title || '').trim();
            const cleanBody = String(body || '').trim();

            if (!cleanTitle || !cleanBody) return cleanTitle;
            if (cleanTitle === cleanBody) return '';
            if (cleanTitle.endsWith('...') && cleanBody.startsWith(cleanTitle.slice(0, -3))) {
                return '';
            }

            return cleanTitle;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function logout() {
            await UserAPI.logout();
            Session.clear();
            goToPage('login.html');
        }

        (async function initFeedPage() {
            currentUser = await requireAuth();
            if (!currentUser) {
                return;
            }

            const initial = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('composerAvatar').textContent = initial;
            document.getElementById('sidebarAvatar').textContent = initial;
            document.getElementById('sidebarName').textContent = currentUser.username;
            document.getElementById('sidebarRole').textContent = '@' + currentUser.username.toLowerCase();

            syncComposerState();
            await loadAll();
        })();
    </script>
</body>

</html>
