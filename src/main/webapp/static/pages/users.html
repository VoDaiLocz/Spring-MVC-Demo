<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mọi người - SocialApp</title>
    <link rel="stylesheet" href="/social-media-app/static/css/style.css">
</head>

<body class="bg-main">
    <div class="x-app">
        <aside class="x-left">
            <div class="x-sticky">
                <a href="/social-media-app/static/pages/feed.html" class="x-logo">SocialApp</a>
                <nav class="x-nav">
                    <a href="/social-media-app/static/pages/feed.html" class="x-nav-link">Bảng tin</a>
                    <a href="/social-media-app/static/pages/users.html" class="x-nav-link active">Mọi người</a>
                    <a href="/social-media-app/static/pages/profile.html" class="x-nav-link">Hồ sơ</a>
                </nav>

                <div class="x-userbox">
                    <div style="font-size:13px; color:var(--x-text-muted);">Đăng nhập với</div>
                    <div id="currentName" style="font-size:18px; font-weight:700; color:#fff;">...</div>
                    <button class="btn btn-outline" onclick="logout()" style="width:100%; max-width:160px;">Đăng xuất</button>
                </div>
            </div>
        </aside>

        <main class="x-center">
            <div class="x-header">Mọi người</div>
            <section class="x-section">
                <div style="display:flex; justify-content:space-between; align-items:end; gap:12px;">
                    <div>
                        <h1 class="section-title">Khám phá cộng đồng</h1>
                        <p class="section-subtitle">Tìm tài khoản để theo dõi</p>
                    </div>
                    <div class="badge"><span id="userCount">0</span> tài khoản</div>
                </div>
            </section>

            <section class="x-section" style="padding-top:12px;">
                <div id="usersList" class="users-grid">
                    <div class="card" style="grid-column:1/-1; color:var(--x-text-muted);">Đang tải danh sách người dùng...</div>
                </div>
            </section>
        </main>

        <aside class="x-right">
            <div class="x-sticky">
                <div class="x-widget" style="margin-top:0; padding:10px 12px;">
                    <input class="form-input" type="text" value="Tìm kiếm" readonly style="border-radius:999px; background:#202327; border:0; color:#71767b;">
                </div>

                <div class="x-widget">
                    <h3 class="x-side-title">Gợi ý</h3>
                    <div class="user-row">
                        <a href="/social-media-app/static/pages/feed.html">Xem bảng tin</a>
                    </div>
                    <div class="user-row">
                        <a href="/social-media-app/static/pages/profile.html">Trang cá nhân</a>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="toast-container"></div>

    <script src="/social-media-app/static/js/api.js"></script>
    <script>
        let currentUser = null;

        async function loadUsers() {
            const list = document.getElementById('usersList');
            try {
                const users = await UserAPI.getAll();
                document.getElementById('userCount').textContent = users.length;
                list.innerHTML = (await Promise.all(users.map(u => renderUserCard(u)))).join('');
            } catch (err) {
                list.innerHTML = '<div class="card" style="grid-column:1/-1; color:#ff8087;">Lỗi khi tải danh sách người dùng.</div>';
            }
        }

        async function renderUserCard(user) {
            const isSelf = user.id === currentUser.id;
            const check = isSelf ? { isFollowing: false } : await FollowAPI.check(user.id);
            const isFollowing = !!check.isFollowing;

            return `
                <div class="card user-card">
                    <div class="user-card-head">
                        <div class="avatar-sm" style="width:42px; height:42px; font-size:16px; cursor:pointer;" onclick="window.location.href='${pageUrl('profile.html', { id: user.id })}'">
                            ${escapeHtml(user.username.charAt(0).toUpperCase())}
                        </div>
                        <div class="user-meta">
                            <div class="user-name" style="cursor:pointer;" onclick="window.location.href='${pageUrl('profile.html', { id: user.id })}'">${escapeHtml(user.username)}</div>
                            <div class="user-role">@${escapeHtml(user.role.toLowerCase())}</div>
                        </div>
                    </div>

                    ${isSelf ? `
                        <button class="btn btn-outline" style="width:100%; opacity:.75; cursor:default;">Đây là bạn</button>
                    ` : `
                        <button class="btn ${isFollowing ? 'btn-outline' : 'btn-fill'}" style="width:100%;" onclick="toggleFollow(${user.id}, ${isFollowing})">
                            ${isFollowing ? 'Đang theo dõi' : 'Theo dõi'}
                        </button>
                    `}
                </div>
            `;
        }

        async function toggleFollow(id, current) {
            const res = current
                ? await FollowAPI.unfollow(id)
                : await FollowAPI.follow(id);

            if (res.success) {
                showToast(current ? 'Đã hủy theo dõi' : 'Đã theo dõi');
                loadUsers();
            } else {
                showToast(res.message || 'Thao tác thất bại', 'error');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function logout() {
            await UserAPI.logout();
            Session.clear();
            goToPage('login.html');
        }

        (async function initUsersPage() {
            currentUser = await requireAuth();
            if (!currentUser) {
                return;
            }

            document.getElementById('currentName').textContent = currentUser.username;
            await loadUsers();
        })();
    </script>
</body>

</html>
